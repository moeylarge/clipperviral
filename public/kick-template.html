<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kick Clip Template</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Barlow:wght@500;600;700;800&family=Oswald:wght@500;600;700&display=swap");

      :root {
        --bg-a: #101525;
        --bg-b: #06080f;
        --panel: rgba(11, 15, 27, 0.8);
        --line: rgba(255, 255, 255, 0.16);
        --text: #f7f9ff;
        --kick: #52f51b;
        --shadow: rgba(83, 252, 24, 0.18);
        --font-ui: "Barlow", "Trebuchet MS", "Segoe UI", sans-serif;
        --font-display: "Oswald", "Arial Black", "Impact", sans-serif;
        --logo-gap: 10px;
        --text-gap: 0px;
        --green-glow-alpha: 0.35;
        --cyan-glow-alpha: 0.22;
        --logo-glow-alpha: 0.28;
        --sweep-green-alpha: 0.13;
        --sweep-cyan-alpha: 0.12;
        --bar-scale: 0.65;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 18px;
        color: var(--text);
        background:
          radial-gradient(circle at 15% 15%, rgba(83, 252, 24, 0.18), transparent 35%),
          radial-gradient(circle at 85% 10%, rgba(0, 168, 255, 0.14), transparent 35%),
          linear-gradient(180deg, var(--bg-a), var(--bg-b));
        font-family: var(--font-ui);
      }

      .panel {
        width: min(760px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
        background: var(--panel);
        backdrop-filter: blur(6px);
      }

      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
      }

      .template-tabs {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
      }

      .template-tab {
        text-decoration: none;
        color: #d9e6ff;
        border: 1px solid var(--line);
        background: rgba(3, 7, 16, 0.84);
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
      }

      .template-tab:hover,
      .template-tab.active {
        border-color: rgba(83, 252, 24, 0.7);
        color: #eaffc4;
      }

      .row + .row {
        margin-top: 10px;
      }

      .label {
        width: 100%;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.78);
        font-family: var(--font-ui);
        font-weight: 700;
      }

      input,
      select,
      button {
        min-height: 40px;
        border-radius: 8px;
        border: 1px solid var(--line);
        color: #fff;
        background: rgba(2, 4, 10, 0.9);
        padding: 9px 12px;
        font-family: var(--font-ui);
      }

      input[type="text"] {
        min-width: 220px;
      }

      input[type="range"] {
        flex: 1 1 220px;
        min-height: auto;
        accent-color: var(--kick);
      }

      button {
        cursor: pointer;
        font-weight: 800;
      }

      button.primary {
        background: var(--kick);
        color: #041108;
        border-color: rgba(83, 252, 24, 0.8);
      }

      .check-control {
        min-height: 40px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 9px 10px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(2, 4, 10, 0.72);
        color: rgba(255, 255, 255, 0.9);
        font-size: 13px;
        font-weight: 700;
      }

      .check-control input {
        min-height: 0;
        padding: 0;
        accent-color: var(--kick);
      }

      .status {
        min-height: 18px;
        margin-top: 8px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.84);
        font-family: var(--font-ui);
      }

      .banner-wrap {
        margin-top: 18px;
      }

      .kick-banner {
        position: relative;
        display: inline-flex;
        align-items: flex-end;
        justify-content: center;
        width: 520px;
        height: 54px;
        padding: 0 18px 7px 206px;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        transform-origin: left top;
        isolation: isolate;
        overflow: visible;
        --text-vertical-offset: 0px;
      }

      .kick-banner::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 34px;
        background: #000;
        pointer-events: none;
        z-index: -1;
      }

      @keyframes borderSweep {
        0% {
          background-position: 220% 0;
        }
        100% {
          background-position: -220% 0;
        }
      }

      .border-sweep {
        display: none;
      }

      .kick-banner .banner-left,
      .kick-banner .banner-right {
        position: relative;
        z-index: 3;
      }

      .banner-left,
      .banner-right {
        display: flex;
        align-items: flex-end;
        height: 43px;
      }

      .banner-left {
        position: absolute;
        left: 16px;
        bottom: 5px;
        width: 160px;
        height: 54px;
        overflow: hidden;
      }

      .logo-box {
        position: relative;
        overflow: visible;
        width: 160px;
        height: 54px;
        display: grid;
        place-items: end start;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        animation: none;
      }

      .logo-box.flash-active {
        animation: logoFlash 2.2s ease-in-out infinite;
      }

      .logo-box::after {
        content: "";
        position: absolute;
        left: 6px;
        right: 10px;
        top: -2px;
        height: 8px;
        pointer-events: none;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0));
        opacity: 0.45;
        transform: translateY(-7px);
      }

      .logo-box svg {
        width: 152px;
        height: 48px;
        transform: translateY(-7px);
        display: block;
        shape-rendering: geometricPrecision;
      }

      .logo-box svg path {
        filter: saturate(1.05);
      }

      @keyframes logoFlash {
        0%,
        100% {
          filter: brightness(1);
          box-shadow:
            0 0 0 0 rgba(83, 252, 24, 0.18),
            0 0 0 0 rgba(0, 202, 255, 0.12);
        }
        50% {
          filter: brightness(1.08);
          box-shadow:
            0 0 10px 1px rgba(83, 252, 24, var(--logo-glow-alpha)),
            0 0 6px 0 rgba(0, 202, 255, 0.16);
        }
      }

      .banner-right {
        font-size: 21px;
        letter-spacing: 0;
        line-height: 1;
        color: #fff;
        font-family: var(--font-display);
        font-weight: 700;
        transform: translateY(var(--text-vertical-offset));
        text-shadow:
          -1px -1px 0 rgba(0, 0, 0, 0.9),
          1px -1px 0 rgba(0, 0, 0, 0.9),
          -1px 1px 0 rgba(0, 0, 0, 0.9),
          1px 1px 0 rgba(0, 0, 0, 0.9);
      }

      .banner-right .base {
        font-size: 1em;
        opacity: 1;
        font-family: var(--font-display);
        font-weight: 700;
        margin-right: var(--text-gap);
      }

      .banner-right .user {
        font-size: 1em;
        font-family: var(--font-display);
        font-weight: 700;
      }

      .banner-link {
        text-decoration: none;
        color: inherit;
      }

      .preview {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 84px;
        display: grid;
        place-items: center;
        background: rgba(0, 0, 0, 0.22);
        overflow: hidden;
      }

      .preview img {
        display: block;
        max-width: 100%;
        height: auto;
      }

      @media (max-width: 680px) {
        .banner-right {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="template-tabs">
        <a class="template-tab active" href="/kick-template.html">Kick Template</a>
        <a class="template-tab" href="/caption-template.html">Caption Template</a>
        <a class="template-tab" href="/caption-template.html#youtube-auto-highlights">YouTube Highlights</a>
      </div>
      <div class="row">
        <div class="label">Streamer name</div>
        <input id="streamerInput" type="text" value="ryangarcia" />
        <button id="openKickButton" class="primary" type="button">Open kick page</button>
        <button id="copyTextButton" type="button">Copy text</button>
      </div>

      <div class="row">
        <div class="label">Banner size</div>
        <select id="exportSizePreset" aria-label="Export size preset">
          <option value="45">Tiny</option>
          <option value="65" selected>Bottom Bar</option>
          <option value="85">Thumbnail</option>
          <option value="custom">Custom</option>
        </select>
        <input id="scaleSlider" type="range" min="35" max="110" value="65" step="5" />
        <span id="scaleValue">65%</span>
      </div>

      <div class="row">
        <div class="label">Style controls</div>
        <select id="textColorSelect" aria-label="Text color">
          <option value="green">Kick green</option>
          <option value="white" selected>White</option>
          <option value="lime-gradient">Lime gradient</option>
          <option value="green-white">Green to white</option>
        </select>
        <label class="check-control">
          <input id="allCapsToggle" type="checkbox" checked />
          All caps
        </label>
        <input id="glowSlider" type="range" min="0" max="150" value="0" step="5" aria-label="Glow strength" />
        <span id="glowValue">Glow 0%</span>
        <input id="spacingSlider" type="range" min="0" max="16" value="0" step="1" aria-label="Text spacing" />
        <span id="spacingValue">Gap 0px</span>
        <input id="safeEdgeSlider" type="range" min="0" max="40" value="14" step="1" aria-label="Safe-edge margin" />
        <span id="safeEdgeValue">Safe edge 14px</span>
        <input id="textVerticalOffsetSlider" type="range" min="-6" max="8" value="0" step="1" aria-label="Text vertical offset" />
        <span id="textVerticalOffsetValue">Text offset 0px</span>
        <label class="check-control">
          <input id="exactKickWidthToggle" type="checkbox" checked />
          Exact Kick width
        </label>
      </div>

      <div class="row">
        <div class="label">Refinement</div>
        <label class="check-control">
          <input id="compactModeToggle" type="checkbox" />
          Compact long names
        </label>
        <label class="check-control">
          <input id="darkClipGuardToggle" type="checkbox" />
          Dark clip guard
        </label>
        <label class="check-control">
          <input id="whiteStrokeOnlyToggle" type="checkbox" />
          White stroke only
        </label>
      </div>

      <div class="row">
        <div class="label">Export</div>
        <label class="check-control">
          <input id="transparentExportToggle" type="checkbox" />
          Transparent export
        </label>
        <button id="copyImageButton" class="primary" type="button">Copy image</button>
        <button id="downloadImageButton" type="button">Download PNG</button>
      </div>

      <div id="status" class="status"></div>

      <div class="banner-wrap">
        <a id="kickLink" class="banner-link" href="https://kick.com/ryangarcia" target="_blank" rel="noreferrer">
          <div id="kickBanner" class="kick-banner" aria-label="Kick profile banner">
            <span class="border-sweep" aria-hidden="true"></span>
            <div class="banner-left">
              <div class="logo-box" aria-hidden="true">
                <svg viewBox="15 90 220 70.6422" focusable="false" aria-hidden="true">
                  <path d="M15 90H38.5714V105.698H46.4286V97.8491H54.2857V90H77.8571V113.547H70V121.397H62.1429V129.246H70V137.095H77.8571V160.642H54.2857V152.793H46.4286V144.944H38.5714V160.642H15V90ZM172.143 90H195.714V105.698H203.571V97.8491H211.429V90H235V113.547H227.143V121.397H219.286V129.246H227.143V137.095H235V160.642H211.429V152.793H203.571V144.944H195.714V160.642H172.143V90ZM85.7143 90H109.286V160.642H85.7143V90ZM125 90V97.8491H117.143V152.793H125V160.642H164.286V137.095H140.714V113.547H164.286V90H125Z" fill="#53FC18"/>
                </svg>
              </div>
            </div>
            <div class="banner-right">
              <span class="base">KICK.COM/</span><span id="userText" class="user">RYANGARCIA</span>
            </div>
          </div>
        </a>
      </div>

      <div class="label" style="margin-top: 12px">Image preview</div>
      <div class="preview">
        <img id="imagePreview" alt="Kick export preview" />
      </div>
    </main>

    <script>
      (function () {
        const streamerInput = document.getElementById("streamerInput");
        const userText = document.getElementById("userText");
        const kickLink = document.getElementById("kickLink");
        const kickBanner = document.getElementById("kickBanner");
        const logoBox = kickBanner.querySelector(".logo-box");
        const exportSizePreset = document.getElementById("exportSizePreset");
        const scaleSlider = document.getElementById("scaleSlider");
        const scaleValue = document.getElementById("scaleValue");
        const textColorSelect = document.getElementById("textColorSelect");
        const allCapsToggle = document.getElementById("allCapsToggle");
        const glowSlider = document.getElementById("glowSlider");
        const glowValue = document.getElementById("glowValue");
        const spacingSlider = document.getElementById("spacingSlider");
        const spacingValue = document.getElementById("spacingValue");
        const safeEdgeSlider = document.getElementById("safeEdgeSlider");
        const safeEdgeValue = document.getElementById("safeEdgeValue");
        const textVerticalOffsetSlider = document.getElementById("textVerticalOffsetSlider");
        const textVerticalOffsetValue = document.getElementById("textVerticalOffsetValue");
        const status = document.getElementById("status");
        const imagePreview = document.getElementById("imagePreview");
        const openKickButton = document.getElementById("openKickButton");
        const copyTextButton = document.getElementById("copyTextButton");
        const copyImageButton = document.getElementById("copyImageButton");
        const downloadImageButton = document.getElementById("downloadImageButton");
        const transparentExportToggle = document.getElementById("transparentExportToggle");
        const exactKickWidthToggle = document.getElementById("exactKickWidthToggle");
        const compactModeToggle = document.getElementById("compactModeToggle");
        const darkClipGuardToggle = document.getElementById("darkClipGuardToggle");
        const whiteStrokeOnlyToggle = document.getElementById("whiteStrokeOnlyToggle");

        const canCopyImage = typeof ClipboardItem === "function" && navigator.clipboard && navigator.clipboard.write;
        const kickIconSvg = "<svg xmlns='http://www.w3.org/2000/svg' viewBox='15 90 220 70.6422'><path d='M15 90H38.5714V105.698H46.4286V97.8491H54.2857V90H77.8571V113.547H70V121.397H62.1429V129.246H70V137.095H77.8571V160.642H54.2857V152.793H46.4286V144.944H38.5714V160.642H15V90ZM172.143 90H195.714V105.698H203.571V97.8491H211.429V90H235V113.547H227.143V121.397H219.286V129.246H227.143V137.095H235V160.642H211.429V152.793H203.571V144.944H195.714V160.642H172.143V90ZM85.7143 90H109.286V160.642H85.7143V90ZM125 90V97.8491H117.143V152.793H125V160.642H164.286V137.095H140.714V113.547H164.286V90H125Z' fill='#53FC18'/></svg>";
        const kickIconImage = new Image();
        kickIconImage.src = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(kickIconSvg)}`;
        const baseLogoReserve = 206;
        const baseLogoWidth = 150;
        const baseTextFont = 21;

        function normalize(name) {
          return name.trim().replace(/^[@/\s]+/g, "").toLowerCase() || "ninadrama";
        }

        function displayName() {
          const user = normalize(streamerInput.value);
          return allCapsToggle.checked ? user.toUpperCase() : user;
        }

        function setStatus(message, isError) {
          status.textContent = message;
          status.style.color = isError ? "#ffaeae" : "rgba(255,255,255,0.84)";
        }

        function updateBanner() {
          const user = normalize(streamerInput.value);
          userText.textContent = displayName();
          kickLink.href = `https://kick.com/${user}`;
          streamerInput.value = user;
          updatePreview();
        }

        function textColorConfig() {
          switch (textColorSelect.value) {
            case "white":
              return { start: "#ffffff", end: "#ffffff", css: "#ffffff" };
            case "lime-gradient":
              return { start: "#d9ff79", end: "#52f51b", css: "linear-gradient(90deg, #d9ff79, #52f51b)" };
            case "green-white":
              return { start: "#52f51b", end: "#ffffff", css: "linear-gradient(90deg, #52f51b, #ffffff)" };
            default:
              return { start: "#52f51b", end: "#52f51b", css: "#52f51b" };
          }
        }

        function applyStyleControls() {
          const glow = Number(glowSlider.value) / 100;
          const spacing = Number(spacingSlider.value);
          const safeEdge = Number(safeEdgeSlider.value);
          const textOffset = Number(textVerticalOffsetSlider.value);
          const effectiveGlow = whiteStrokeOnlyToggle.checked ? 0 : glow;
          const isDarkGuard = darkClipGuardToggle.checked;
          const isWhiteStroke = whiteStrokeOnlyToggle.checked;
          const colors = textColorConfig();

          document.documentElement.style.setProperty("--green-glow-alpha", String(0.5 * effectiveGlow));
          document.documentElement.style.setProperty("--cyan-glow-alpha", String(0.32 * effectiveGlow));
          document.documentElement.style.setProperty("--logo-glow-alpha", String(0.4 * effectiveGlow));
          document.documentElement.style.setProperty("--sweep-green-alpha", String(0.18 * effectiveGlow));
          document.documentElement.style.setProperty("--sweep-cyan-alpha", String(0.16 * effectiveGlow));
          document.documentElement.style.setProperty("--logo-gap", `${10 + spacing}px`);
          document.documentElement.style.setProperty("--text-gap", `${spacing}px`);
          document.documentElement.style.setProperty("--safe-edge", `${safeEdge}px`);
          logoBox.classList.toggle("flash-active", glow > 0);
          kickBanner.style.boxShadow = `0 0 ${Math.round(16 * effectiveGlow)}px -9px rgba(83, 252, 24, ${0.25 * effectiveGlow})`;
          kickBanner.style.paddingRight = `${Math.max(8, Math.round(6 + safeEdge / 2))}px`;
          kickBanner.style.paddingLeft = `${Math.round(baseLogoReserve + (exactKickWidthToggle.checked ? 0 : safeEdge * 0.2) + 0)}px`;
          kickBanner.style.setProperty("--text-vertical-offset", `${textOffset}px`);
          glowValue.textContent = `Glow ${Math.round(glow * 100)}%`;
          spacingValue.textContent = `Gap ${spacing}px`;
          safeEdgeValue.textContent = `Safe edge ${safeEdge}px`;
          textVerticalOffsetValue.textContent = `Text offset ${textOffset}px`;
          const baseTextShadow = isDarkGuard
            ? "-1px -1px 0 rgba(0,0,0,0.95), 1px -1px 0 rgba(0,0,0,0.95), -1px 1px 0 rgba(0,0,0,0.95), 1px 1px 0 rgba(0,0,0,0.95)"
            : "-1px -1px 0 rgba(0, 0, 0, 0.9), 1px -1px 0 rgba(0, 0, 0, 0.9), -1px 1px 0 rgba(0, 0, 0, 0.9), 1px 1px 0 rgba(0, 0, 0, 0.9)";
          kickBanner.querySelector(".banner-right").style.textShadow = isWhiteStroke
            ? "-1px -1px 0 rgba(0, 0, 0, 0.9), 1px -1px 0 rgba(0, 0, 0, 0.9), -1px 1px 0 rgba(0, 0, 0, 0.9), 1px 1px 0 rgba(0, 0, 0, 0.9)"
            : baseTextShadow;
          kickBanner.querySelector(".banner-right").style.webkitTextStroke = isWhiteStroke ? "1px #fff" : "";
          kickBanner.querySelector(".banner-right").style.textStroke = isWhiteStroke ? "1px #fff" : "";
          const previewRightPadding = Math.max(8, Math.round(6 + safeEdge / 2));
          const previewLeftPadding = baseLogoReserve + (exactKickWidthToggle.checked ? 0 : safeEdge * 0.2);
          const previewTextSlot = Math.max(90, 520 - previewLeftPadding - previewRightPadding);
          const compactPreviewFont = getCompactFontSize(`KICK.COM/${displayName()}`, baseTextFont, previewTextSlot);
          kickBanner.querySelector(".banner-right").style.fontSize = `${compactPreviewFont}px`;

          if (colors.css.startsWith("linear-gradient")) {
            kickBanner.querySelector(".banner-right").style.color = "transparent";
            kickBanner.querySelector(".banner-right").style.background = colors.css;
            kickBanner.querySelector(".banner-right").style.WebkitBackgroundClip = "text";
            kickBanner.querySelector(".banner-right").style.backgroundClip = "text";
          } else {
            kickBanner.querySelector(".banner-right").style.color = colors.css;
            kickBanner.querySelector(".banner-right").style.background = "";
            kickBanner.querySelector(".banner-right").style.WebkitBackgroundClip = "";
            kickBanner.querySelector(".banner-right").style.backgroundClip = "";
          }

          updateBanner();
        }

        function updateScale() {
          const value = Number(scaleSlider.value) / 100;
          kickBanner.style.transform = `scale(${value})`;
          scaleValue.textContent = `${Math.round(value * 100)}%`;
          updatePreview();
        }

        function applyExportSizePreset() {
          if (exportSizePreset.value === "custom") {
            return;
          }

          scaleSlider.value = exportSizePreset.value;
          updateScale();
          setStatus(`Export size set to ${exportSizePreset.options[exportSizePreset.selectedIndex].text}.`);
        }

        function getCompactFontSize(text, baseFontPx, maxWidth) {
          if (!compactModeToggle.checked || maxWidth <= 0) {
            return baseFontPx;
          }

          const measure = document.createElement("canvas").getContext("2d");
          measure.font = `700 ${baseFontPx}px Oswald, Arial Black, Impact, sans-serif`;
          const measured = measure.measureText(text).width;
          if (measured <= maxWidth) {
            return baseFontPx;
          }
          const minFont = Math.max(11, Math.round(baseFontPx * 0.63));
          return Math.max(minFont, Math.floor(baseFontPx * (maxWidth / measured)));
        }

        function drawRoundedRect(ctx, x, y, w, h, r) {
          const radius = Math.min(r, w / 2, h / 2);
          ctx.moveTo(x + radius, y);
          ctx.lineTo(x + w - radius, y);
          ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
          ctx.lineTo(x + w, y + h - radius);
          ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
          ctx.lineTo(x + radius, y + h);
          ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
          ctx.lineTo(x, y + radius);
          ctx.quadraticCurveTo(x, y, x + radius, y);
        }

        function drawFlashForKick(ctx, x, y, w, h, scale, intensity) {
          const clamp = Math.min(1, Math.max(0.08, intensity));
          const blur = Math.max(2, Math.round(3.6 * scale));

          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.filter = `blur(${blur}px)`;
          ctx.globalAlpha = 0.28 + clamp * 0.5;
          ctx.drawImage(kickIconImage, x - Math.round(scale * 0.8), y - Math.round(scale), w + Math.round(scale * 1.6), h + Math.round(scale * 1.9));
          ctx.filter = "none";

          ctx.globalAlpha = 0.2 + clamp * 0.3;
          ctx.filter = `drop-shadow(${(-0.8 * scale).toFixed(2)}px ${(0.6 * scale).toFixed(2)}px ${Math.max(2, blur - 1)}px rgba(83, 252, 24, ${0.22 + clamp * 0.55})`;
          ctx.drawImage(kickIconImage, x - Math.round(scale * 0.6), y + Math.round(scale * 0.4), w + Math.round(scale * 1.2), h);

          ctx.globalAlpha = 0.15 + clamp * 0.25;
          ctx.filter = `drop-shadow(${(0.8 * scale).toFixed(2)}px ${(-0.4 * scale).toFixed(2)}px ${Math.max(2, blur - 1)}px rgba(0, 200, 255, ${0.16 + clamp * 0.35})`;
          ctx.drawImage(kickIconImage, x - Math.round(scale * 0.4), y - Math.round(scale * 0.5), w + Math.round(scale * 0.7), h + Math.round(scale * 0.2));
          ctx.restore();

          const flashBand = ctx.createLinearGradient(x, y + Math.round(h * 0.12), x, y + Math.round(h * 0.28));
          flashBand.addColorStop(0, "rgba(255, 255, 255, 0)");
          flashBand.addColorStop(0.45, `rgba(255, 255, 255, ${Math.min(0.26, 0.1 + clamp * 0.5)})`);
          flashBand.addColorStop(1, "rgba(255, 255, 255, 0)");
          ctx.save();
          ctx.fillStyle = flashBand;
          ctx.globalAlpha = Math.min(0.8, 0.3 + clamp * 0.4);
          ctx.fillRect(x + Math.round(w * 0.11), y + Math.round(h * 0.1), Math.round(w * 0.68), Math.round(h * 0.2));
          ctx.restore();
        }

        function renderCanvas() {
          const user = displayName();
          const scale = Number(scaleSlider.value) / 100;
          const isTransparentExport = transparentExportToggle.checked;
          const glow = Number(glowSlider.value) / 100;
          const spacingSetting = Number(spacingSlider.value);
          const safeEdge = Number(safeEdgeSlider.value);
          const textOffset = Number(textVerticalOffsetSlider.value);
          const colors = textColorConfig();
          const h = Math.max(38, Math.round(54 * scale));
          const barH = Math.max(24, Math.round(34 * scale));
          const textFontBase = Math.max(14, Math.round(baseTextFont * scale));
          const leftPad = Math.max(9, Math.round(16 * scale));
          const rightPad = Math.max(12, Math.round((18 + safeEdge / 2) * scale));
          const logoReserve = Math.round((exactKickWidthToggle.checked ? baseLogoReserve : baseLogoReserve + 8) * scale);
          const logoW = Math.round((exactKickWidthToggle.checked ? baseLogoWidth : baseLogoWidth + spacingSetting * 0.4) * scale);
          const text = `KICK.COM/${user}`;
          const isWhiteStrokeOnly = whiteStrokeOnlyToggle.checked;
          const guardDark = darkClipGuardToggle.checked;
          const effectiveGlow = isWhiteStrokeOnly ? 0 : glow;
          const flashEnabled = glow > 0;

          const measure = document.createElement("canvas").getContext("2d");
          const baseTextSlot = Math.max(90, Math.round(520 * scale) - logoReserve - rightPad);
          const compactTextFont = Math.max(11, getCompactFontSize(text, textFontBase, baseTextSlot));
          measure.font = `700 ${compactTextFont}px Oswald, Arial Black, Impact, sans-serif`;
          const textW = measure.measureText(text).width;
          const w = Math.max(260, Math.round(520 * scale));
          const textAvailable = Math.max(90, w - logoReserve - rightPad);
          const textFont = Math.max(11, getCompactFontSize(text, compactTextFont, textAvailable));

          const canvas = document.createElement("canvas");
          canvas.width = w * 2;
          canvas.height = h * 2;
          const ctx = canvas.getContext("2d");
          ctx.scale(2, 2);

        if (!isTransparentExport) {
            ctx.save();
            ctx.shadowBlur = Math.round(5 * scale * effectiveGlow);
            ctx.shadowColor = `rgba(83,252,24,${0.16 * effectiveGlow})`;
            ctx.fillStyle = "#000";
            ctx.fillRect(0, h - barH, w, barH);
            ctx.restore();
          }

          const logoX = leftPad;
          const logoH = Math.max(30, Math.round(48 * scale));
          const logoY = h - (Math.round((barH - logoH) / 2) + logoH) - Math.round(7 * scale);
          ctx.save();
          if (kickIconImage.complete && kickIconImage.naturalWidth > 0) {
            ctx.imageSmoothingEnabled = true;
            ctx.filter = "drop-shadow(0 1px 1px rgba(0,0,0,0.35))";
            ctx.globalAlpha = 1;
            if (flashEnabled) {
              drawFlashForKick(ctx, logoX, logoY, logoW, logoH, scale, glow);
            }
            ctx.drawImage(kickIconImage, logoX, logoY, logoW, logoH);
            ctx.filter = "none";
            ctx.fillStyle = "rgba(255,255,255,0.32)";
            const sheenX = logoX + Math.round(logoW * 0.06);
            const sheenY = logoY + Math.round(logoH * 0.10);
            const sheenW = Math.round(logoW * 0.88);
            const sheenH = Math.max(2, Math.round(logoH * 0.18));
            const sheen = ctx.createLinearGradient(sheenX, sheenY, sheenX, sheenY + sheenH);
            sheen.addColorStop(0, "rgba(255,255,255,0.45)");
            sheen.addColorStop(1, "rgba(255,255,255,0)");
            ctx.fillStyle = sheen;
            ctx.fillRect(sheenX, sheenY, sheenW, sheenH);
          } else {
            ctx.shadowBlur = Math.round(2.5 * scale);
            ctx.shadowColor = "rgba(0,0,0,0.35)";
            ctx.font = `900 ${Math.max(35, Math.round(58 * scale))}px Arial Black, Impact, sans-serif`;
            ctx.strokeStyle = "#000";
            ctx.fillStyle = "#53FC18";
            ctx.lineWidth = Math.max(2, 4 * scale);
            ctx.strokeText("KICK", logoX, logoY + logoH);
            ctx.fillText("KICK", logoX, logoY + logoH);
          }
          ctx.restore();

          const textX = logoReserve + Math.max(0, spacingSetting * scale);
          const textY = h - Math.round((barH - textFont) / 2) - Math.round(5 * scale - textOffset * scale);
          const fontPx = Math.max(11, textFont);
          const finalTextFont = Math.max(11, fontPx);
          ctx.lineJoin = "round";
          ctx.miterLimit = 2;
          const textGradient = ctx.createLinearGradient(textX, 0, textX + textW, 0);
          textGradient.addColorStop(0, colors.start);
          textGradient.addColorStop(1, colors.end);
          ctx.shadowBlur = isWhiteStrokeOnly ? 0 : Math.round(3 * scale * effectiveGlow);
          ctx.shadowColor = `rgba(83,252,24,${0.18 * effectiveGlow})`;
          ctx.fillStyle = textGradient;
          ctx.font = `700 ${finalTextFont}px Oswald, Arial Black, Impact, sans-serif`;
          ctx.strokeStyle = isWhiteStrokeOnly ? "rgba(255,255,255,0.95)" : `rgba(0,0,0,${guardDark ? "0.95" : "0.92"})`;
          ctx.lineWidth = isWhiteStrokeOnly ? Math.max(1.2, 2 * scale) : Math.max(1, 1.4 * scale);
          ctx.strokeText(text, textX, textY);
          ctx.fillText(text, textX, textY);
          if (guardDark) {
            ctx.shadowBlur = Math.round(2 * scale * (glow + 1));
            ctx.shadowColor = "rgba(0,0,0,0.55)";
            ctx.strokeStyle = "rgba(0,0,0,0.95)";
            ctx.lineWidth = Math.max(1.4, 2.2 * scale);
            ctx.strokeText(text, textX, textY);
          }
          ctx.shadowBlur = 0;

          return canvas;
        }

        function downloadCanvas(canvas, filename) {
          const a = document.createElement("a");
          a.href = canvas.toDataURL("image/png");
          a.download = filename;
          a.click();
        }

        function updatePreview() {
          try {
            const canvas = renderCanvas();
            imagePreview.src = canvas.toDataURL("image/png");
          } catch (err) {
            setStatus(err.message || "Preview failed to render.", true);
          }
        }

        streamerInput.addEventListener("input", updateBanner);
        exportSizePreset.addEventListener("change", applyExportSizePreset);
        scaleSlider.addEventListener("input", function () {
          exportSizePreset.value = "custom";
          updateScale();
        });
        transparentExportToggle.addEventListener("change", updatePreview);
        textColorSelect.addEventListener("change", applyStyleControls);
        allCapsToggle.addEventListener("change", applyStyleControls);
        glowSlider.addEventListener("input", applyStyleControls);
        spacingSlider.addEventListener("input", applyStyleControls);
        safeEdgeSlider.addEventListener("input", applyStyleControls);
        textVerticalOffsetSlider.addEventListener("input", applyStyleControls);
        exactKickWidthToggle.addEventListener("change", applyStyleControls);
        compactModeToggle.addEventListener("change", applyStyleControls);
        darkClipGuardToggle.addEventListener("change", applyStyleControls);
        whiteStrokeOnlyToggle.addEventListener("change", applyStyleControls);

        openKickButton.addEventListener("click", function () {
          window.open(kickLink.href, "_blank", "noopener,noreferrer");
        });

        copyTextButton.addEventListener("click", async function () {
          await navigator.clipboard.writeText(`kick.com/${normalize(streamerInput.value)}`);
          setStatus("Copied text.");
        });

        copyImageButton.addEventListener("click", function () {
          if (!canCopyImage) {
            setStatus("Clipboard image is not supported in this browser.", true);
            return;
          }
          const canvas = renderCanvas();
          canvas.toBlob(async function (blob) {
            if (!blob) {
              setStatus("Could not create PNG.", true);
              return;
            }
            await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
            setStatus("Copied image.");
          }, "image/png");
        });

        downloadImageButton.addEventListener("click", function () {
          const name = normalize(streamerInput.value);
          const canvas = renderCanvas();
          downloadCanvas(canvas, `kick-${name}.png`);
          setStatus("Downloaded PNG.");
        });

        window.addEventListener("error", function (event) {
          setStatus(event.message || "Something blocked script loading.", true);
        });

        applyStyleControls();
        updateScale();
      })();
    </script>
  </body>
</html>
