<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=/editor.html" />
    <title>Kick Overlay | ClipperViral</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f7f8fb;
        --muted: #aeb7c8;
        --kick: #53fc18;
        --panel: #10131c;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #06070a;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(460px, calc(100vw - 32px));
        border: 1px solid rgba(83, 252, 24, 0.28);
        border-radius: 8px;
        background: var(--panel);
        padding: 22px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 24px;
        line-height: 1.08;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        border: 1px solid #14350e;
        border-radius: 8px;
        background: var(--kick);
        color: #081103;
        padding: 0 14px;
        font-weight: 950;
        text-decoration: none;
        box-shadow: 0 14px 30px rgba(83, 252, 24, 0.18);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Kick overlays moved to the editor.</h1>
      <p>Use Elements in the editor for Kick overlay preview, MP4 export, and PNG download.</p>
      <a href="/editor.html">Open editor</a>
    </main>
  </body>
</html>
